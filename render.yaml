databases:
  - name: cybersecurity-db
    databaseName: tesis_archivos
    plan: free

services:
  - type: web
    name: cybersecurity-evaluation-system
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cybersecurity-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: OPENAI_API_KEY
        sync: false
      - key: USE_CHATGPT_RECOMMENDATIONS
        value: true
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: OPENAI_MAX_TOKENS
        value: 1500
      - key: OPENAI_TEMPERATURE
        value: 0.7
      - key: CHATGPT_TIMEOUT
        value: 30000
      - key: JWT_SECRET
        generateValue: true
      - key: USE_N8N_INTEGRATION
        value: true
      - key: N8N_WEBHOOK_URL
        value: https://n8n-automation-service-dorp.onrender.com/webhook/file_uploaded
      - key: UPLOAD_FOLDER
        value: /opt/render/project/src/uploads
      - key: MAX_FILE_SIZE
        value: 10485760

  - type: web
    name: n8n-automation-service
    env: node
    plan: free
    buildCommand: cp n8n-package.json package.json && npm install
    startCommand: node n8n-init.js
    envVars:
      - key: PORT
        value: 10000
      - key: N8N_BASIC_AUTH_ACTIVE
        value: true
      - key: N8N_BASIC_AUTH_USER
        value: admin
      - key: N8N_BASIC_AUTH_PASSWORD
        generateValue: true
      - key: N8N_SECURE_COOKIE
        value: false
      - key: N8N_TRUST_PROXY
        value: true
      - key: N8N_RUNNERS_ENABLED
        value: true
      - key: N8N_BLOCK_ENV_ACCESS_IN_NODE
        value: false
      - key: WEBHOOK_TUNNEL_URL
        value: https://n8n-automation-service-dorp.onrender.com
      - key: N8N_WORKFLOWS_FOLDER
        value: /tmp/n8n-workflows
      - key: N8N_DEFAULT_BINARY_DATA_MODE
        value: filesystem