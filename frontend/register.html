<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta - Sistema de Ciberseguridad</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="assets/css/auth.css">
</head>
<body>
    <div class="register-container">
        <div class="register-card">
            <div class="register-header">
                <div class="logo-container">
                    <i class="bi bi-person-plus-fill"></i>
                </div>
                <h1>Crear Nueva Cuenta</h1>
                <p>Sistema de Análisis de Madurez NIST CSF 2.0</p>
            </div>
            <div class="register-body">
                <div id="alertMessage" class="alert d-none" role="alert">
                    <i class="bi me-2"></i>
                    <span id="alertText"></span>
                </div>
                <form id="registerForm">
                    <div class="input-wrapper">
                        <label for="name" class="form-label">
                            <i class="bi bi-person-fill"></i>
                            Nombre Completo
                        </label>
                        <input type="text" class="form-control" id="name" name="name" required
                               placeholder="Juan Pérez" minlength="3" autocomplete="name">
                    </div>
                    <div class="input-wrapper">
                        <label for="email" class="form-label">
                            <i class="bi bi-envelope-fill"></i>
                            Correo Electrónico
                        </label>
                        <input type="email" class="form-control" id="email" name="email" required
                               placeholder="tu@email.com" autocomplete="email">
                    </div>
                    <div class="input-wrapper">
                        <label for="password" class="form-label">
                            <i class="bi bi-lock-fill"></i>
                            Contraseña
                        </label>
                        <div style="position: relative;">
                            <input type="password" class="form-control" id="password" name="password" required
                                   placeholder="Mínimo 8 caracteres" minlength="8" autocomplete="new-password">
                            <i class="bi bi-eye password-toggle" id="togglePassword"></i>
                        </div>
                        <div class="password-strength" id="strengthIndicator">
                            <div class="password-strength-bar"></div>
                        </div>
                        <div class="password-strength-text" id="strengthText"></div>
                    </div>
                    <div class="input-wrapper">
                        <label for="confirmPassword" class="form-label">
                            <i class="bi bi-lock-fill"></i>
                            Confirmar Contraseña
                        </label>
                        <div style="position: relative;">
                            <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" required
                                   placeholder="Repite tu contraseña" minlength="8" autocomplete="new-password">
                            <i class="bi bi-eye password-toggle" id="toggleConfirmPassword"></i>
                        </div>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="terms" name="terms" required>
                        <label class="form-check-label" for="terms">
                            Acepto los términos y condiciones de uso del sistema
                        </label>
                    </div>
                    <button type="submit" class="btn btn-register" id="btnRegister">
                        <i class="bi bi-person-check-fill"></i>
                        <span>Crear Cuenta</span>
                    </button>
                </form>
                <div class="divider">
                    <span>o</span>
                </div>
                <div class="login-link">
                    ¿Ya tienes cuenta? <a href="/login.html">Iniciar sesión</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/auth.js"></script>
    <script>
        // Password toggles
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const icon = this;
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('bi-eye');
                icon.classList.add('bi-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('bi-eye-slash');
                icon.classList.add('bi-eye');
            }
        });

        document.getElementById('toggleConfirmPassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('confirmPassword');
            const icon = this;
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('bi-eye');
                icon.classList.add('bi-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('bi-eye-slash');
                icon.classList.add('bi-eye');
            }
        });

        // Password strength indicator
        document.getElementById('password').addEventListener('input', function(e) {
            const password = e.target.value;
            const indicator = document.getElementById('strengthIndicator');
            const text = document.getElementById('strengthText');
            
            if (password.length === 0) {
                indicator.className = 'password-strength';
                text.textContent = '';
                return;
            }
            
            let strength = 0;
            if (password.length >= 8) strength++;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
            if (/\d/.test(password)) strength++;
            if (/[^a-zA-Z0-9]/.test(password)) strength++;
            
            indicator.className = 'password-strength';
            if (strength <= 1) {
                indicator.classList.add('strength-weak');
                text.textContent = 'Débil';
            } else if (strength <= 3) {
                indicator.classList.add('strength-medium');
                text.textContent = 'Media';
            } else {
                indicator.classList.add('strength-strong');
                text.textContent = 'Fuerte';
            }
        });

        // Form submission
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const btnRegister = document.getElementById('btnRegister');
            const alertDiv = document.getElementById('alertMessage');
            const alertText = document.getElementById('alertText');
            const alertIcon = alertDiv.querySelector('i');
            
            // Validate passwords match
            if (password !== confirmPassword) {
                alertDiv.className = 'alert alert-danger';
                alertIcon.className = 'bi bi-exclamation-triangle-fill me-2';
                alertText.textContent = 'Las contraseñas no coinciden';
                alertDiv.classList.remove('d-none');
                return;
            }
            
            // Disable form
            btnRegister.disabled = true;
            btnRegister.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Creando cuenta...';
            alertDiv.classList.add('d-none');
            
            try {
                const result = await AuthManager.register(name, email, password, confirmPassword);
                
                if (result.success) {
                    alertDiv.className = 'alert alert-success';
                    alertIcon.className = 'bi bi-check-circle-fill me-2';
                    alertText.textContent = '¡Cuenta creada exitosamente! Redirigiendo al login...';
                    alertDiv.classList.remove('d-none');
                    
                    setTimeout(() => {
                        window.location.href = '/login.html';
                    }, 1500);
                } else {
                    alertDiv.className = 'alert alert-danger';
                    alertIcon.className = 'bi bi-exclamation-triangle-fill me-2';
                    alertText.textContent = result.message || 'Error al crear la cuenta. Intenta nuevamente.';
                    alertDiv.classList.remove('d-none');
                    btnRegister.disabled = false;
                    btnRegister.innerHTML = '<i class="bi bi-person-check-fill"></i><span>Crear Cuenta</span>';
                }
            } catch (error) {
                console.error('Register error:', error);
                alertDiv.className = 'alert alert-danger';
                alertIcon.className = 'bi bi-exclamation-triangle-fill me-2';
                alertText.textContent = 'Error de conexión. Por favor intenta nuevamente.';
                alertDiv.classList.remove('d-none');
                btnRegister.disabled = false;
                btnRegister.innerHTML = '<i class="bi bi-person-check-fill"></i><span>Crear Cuenta</span>';
            }
        });
    </script>
</body>
</html>
