<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Sistema de Ciberseguridad</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="assets/css/auth.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo-container">
                    <i class="bi bi-shield-lock-fill"></i>
                </div>
                <h1>Evaluación de Ciberseguridad</h1>
                <p>Sistema de Análisis de Madurez NIST CSF 2.0</p>
            </div>
            <div class="login-body">
                <div id="alertMessage" class="alert alert-danger d-none" role="alert">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                    <span id="alertText"></span>
                </div>
                <form id="loginForm">
                    <div class="input-wrapper">
                        <label for="email" class="form-label">
                            <i class="bi bi-envelope-fill"></i>
                            Correo Electrónico
                        </label>
                        <input type="email" class="form-control" id="email" name="email" required
                               placeholder="tu@email.com" autocomplete="email">
                    </div>
                    <div class="input-wrapper">
                        <label for="password" class="form-label">
                            <i class="bi bi-lock-fill"></i>
                            Contraseña
                        </label>
                        <div style="position: relative;">
                            <input type="password" class="form-control" id="password" name="password" required
                                   placeholder="••••••••" minlength="8" autocomplete="current-password">
                            <i class="bi bi-eye password-toggle" id="togglePassword"></i>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-login" id="btnLogin">
                        <i class="bi bi-box-arrow-in-right"></i>
                        <span>Iniciar Sesión</span>
                    </button>
                </form>
                <div class="divider">
                    <span>o</span>
                </div>
                <div class="register-link">
                    ¿No tienes cuenta? <a href="/register.html">Crear cuenta nueva</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/auth.js"></script>
    <script>
        // Toggle password visibility
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const icon = this;
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('bi-eye');
                icon.classList.add('bi-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('bi-eye-slash');
                icon.classList.add('bi-eye');
            }
        });

        // Auto redirect if already logged in
        if (AuthManager.isAuthenticated()) {
            window.location.href = '/';
        }

        // Form submission
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btnLogin = document.getElementById('btnLogin');
            const alertDiv = document.getElementById('alertMessage');
            const alertText = document.getElementById('alertText');
            
            // Disable form
            btnLogin.disabled = true;
            btnLogin.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Iniciando sesión...';
            alertDiv.classList.add('d-none');
            
            try {
                const result = await AuthManager.login(email, password);
                
                if (result.success) {
                    window.location.href = '/';
                } else {
                    alertText.textContent = result.message || 'Error de autenticación. Verifica tus credenciales.';
                    alertDiv.classList.remove('d-none');
                }
            } catch (error) {
                console.error('Login error:', error);
                alertText.textContent = 'Error de conexión. Por favor intenta nuevamente.';
                alertDiv.classList.remove('d-none');
            } finally {
                btnLogin.disabled = false;
                btnLogin.innerHTML = '<i class="bi bi-box-arrow-in-right"></i><span>Iniciar Sesión</span>';
            }
        });
    </script>
</body>
</html>
